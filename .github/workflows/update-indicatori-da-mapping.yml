name: update-indicatori-da-mapping
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      # Checkout costituzione-italiana + dataset-incubator (per mapping YAML + clean_catalog)
      - uses: actions/checkout@v7
      - uses: actions/checkout@v7
        with:
          repository: dataciviclab/dataset-incubator
          path: dataset-incubator
          sparse-checkout: |
            registry/
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
        timeout-minutes: 5
      - run: python3 strumenti/genera-indicatori-costituzionali.py
        timeout-minutes: 5
      - run: |
          if [ -n "$(git status --porcelain data/)" ]; then
            git config user.name "github-actions"
            git config user.email "actions@github.com"
            git add data/
            git commit -m "chore(data): update indicatori costituzionali da mapping YAML [skip ci]"
            git push
          fi
