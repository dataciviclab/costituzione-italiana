name: update-da-corte
on:
  schedule:
    # Ogni lunedì alle 6:00
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
        timeout-minutes: 5
      - run: python3 strumenti/importa-corte-costituzionale.py
        timeout-minutes: 10
      - run: python3 strumenti/importa-massime.py
        timeout-minutes: 10
      - run: |
          if [ -n "$(git status --porcelain data/)" ]; then
            git config user.name "github-actions"
            git config user.email "actions@github.com"
            git add data/*.parquet data/*.csv
            git commit -m "chore(data): update da Corte Costituzionale [skip ci]"
            git push
          fi
