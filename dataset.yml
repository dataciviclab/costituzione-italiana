dataset:
  name: costituzione_italiana
  display_name: Costituzione della Repubblica Italiana
  description: >
    Testo vigente della Costituzione della Repubblica Italiana, strutturato
    articolo per articolo con partizioni (Parti, Titoli, Sezioni).
    Include le Disposizioni transitorie e finali (I–XVIII).
    Fonte originale: Wikisource (CC BY-SA 3.0), allineata con Normattiva.
  source: Wikisource — https://it.wikisource.org/wiki/Italia,_Repubblica_-_Costituzione
  source_url: https://it.wikisource.org/wiki/Italia,_Repubblica_-_Costituzione
  license: CC BY-SA 3.0

  coverage:
    period_start: 1948-01-01
    period_end: null  # vigente
    territory: Italia
    granularity: articolo

  schema:
    fields:
      - name: articolo
        type: integer
        description: Numero dell'articolo (1–139) o null per disposizioni transitorie
      - name: disposizione
        type: string
        description: Numero romano della disposizione transitoria (I–XVIII) o null per articoli
      - name: parte
        type: string
        description: Nome della parte (es. "Principi fondamentali")
      - name: titolo
        type: string
        description: Titolo all'interno della parte (es. "Rapporti civili")
      - name: sezione
        type: string
        description: Sezione all'interno del titolo (es. "Le Camere")
      - name: testo
        type: string
        description: Testo completo dell'articolo/disposizione
      - name: commi
        type: integer
        description: Numero di commi nell'articolo
      - name: heading
        type: string
        description: Intestazione completa (es. "Art. 1", "Disposizione transitoria I")

    key_fields: [articolo]

  tags:
    - costituzione
    - diritti
    - cittadinanza
    - ordinamento
    - normativa

datasets:
  - name: articoli
    display_name: Articoli della Costituzione
    path: data/articoli.parquet
    description: Ogni articolo/disposizione con testo, parte, titolo, sezione.
    fields:
      - articolo: integer
      - disposizione: string
      - parte: string
      - titolo: string
      - sezione: string
      - heading: string
      - testo: string
      - commi: integer

  - name: revisioni
    display_name: Leggi di revisione costituzionale
    path: data/revisioni.parquet
    description: >
      50 leggi costituzionali da italia-corpus, con gli articoli della
      Costituzione che modificano. Fonte: italia-corpus/Leggi costituzionali.
    fields:
      - urn: string
      - codice_redazionale: string
      - data: string
      - titolo: string
      - articoli_modificati: list(int)
      - n_articoli: integer
      - tipo: string

  - name: atti_promovimento
    display_name: Atti di promovimento (Corte Costituzionale)
    path: data/atti-promovimento.parquet
    description: >
      Parametri costituzionali evocati nei giudizi di legittimità costituzionale.
      Fonte: dati.cortecostituzionale.it, aggiornato giornalmente.
    fields:
      - tipo: string
      - anno: integer
      - numero_atto: integer
      - numero_parte: integer
      - parametro_articolo: integer
      - parametro_comma: string
      - norma_descrizione: string
      - norma_numero: string
      - norma_articolo: string
      - norme_str: string
      - n_norme: integer
